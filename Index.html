<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Community Messages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #vk_community_messages {
            width: 400px;
            height: 500px;
        }
    </style>
</head>
<body>

    <div id="vk_community_messages"></div>

    <script src="https://vk.com/js/api/openapi.js?169"></script>
    <script>
        VK.init({ apiId: 54471047, onlyWidgets: true });

        VK.Widgets.CommunityMessages("vk_community_messages", 235927639, {
            tooltipButtonText: "Написать в VK",
            expanded: 1
        });
    </script>

</body>
</html>
