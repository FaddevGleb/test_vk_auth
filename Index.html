<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Community Messages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #f0f2f5; }
    </style>
</head>
<body>

    <div id="vk_community_messages"></div>

    <script src="https://vk.com/js/api/openapi.js?169"></script>
    <script>
        // apiId — ID вашего VK-приложения (https://vk.com/apps?act=manage)
        // Нужно создать приложение типа "Сайт" и добавить домен в доверенные
        // Без apiId виджет всё равно работает, но в консоли будет ошибка fastXDM
        var VK_APP_ID = 54471047; // <-- сюда вставить свой App ID

        if (VK_APP_ID) {
            VK.init({ apiId: VK_APP_ID, onlyWidgets: true });
        }

        VK.Widgets.CommunityMessages("vk_community_messages", 235927639, {
            tooltipButtonText: "Написать в VK",
            expanded: 0
        });
    </script>

</body>
</html>
